{{- define "main" }}
<article class="guestbook-page">
  <header class="guestbook-header">
    <h1>{{ .Title }}</h1>
    <p class="guestbook-desc">{{ .Description }}</p>
  </header>

  <div class="guestbook-input-area">
    <div class="guestbook-input-hint">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>使用 GitHub 账号登录后即可留言、回复和点赞</span>
    </div>
  </div>

  <div class="guestbook-messages">
    {{- if .Param "comments" }}
    {{- if site.Params.giscus }}
    <script src="https://giscus.app/client.js"
      data-repo="{{ site.Params.giscus.repo }}"
      data-repo-id="{{ site.Params.giscus.repoId }}"
      data-category="{{ site.Params.giscus.category }}"
      data-category-id="{{ site.Params.giscus.categoryId }}"
      data-mapping="pathname"
      data-strict="0"
      data-reactions-enabled="1"
      data-emit-metadata="1"
      data-input-position="top"
      data-theme="dark_dimmed"
      data-lang="zh-CN"
      data-loading="lazy"
      crossorigin="anonymous"
      async>
    </script>
    {{- end }}
    {{- end }}
  </div>

  <div class="guestbook-share">
    <span class="guestbook-share-label">分享留言板：</span>
    <div class="guestbook-share-btns">
      <a class="gb-share-btn gb-share-weibo" onclick="shareToWeibo()" title="分享到微博">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.194 14.197c0 3.248-4.085 6.796-9.553 6.796-4.56 0-9.592-2.318-9.592-6.297 0-2.078 1.184-4.48 3.224-6.562 2.72-2.777 5.885-4.03 7.07-2.77.526.562.562 1.41.223 2.388-.166.476.442.21.442.21 1.828-.79 3.404-1.002 4.008.023.316.537.166 1.29-.326 2.16-.136.24-.052.307.198.183 1.392-.69 2.62-.7 3.12.12.467.758.14 1.82-.558 2.96-.156.255-.04.338.21.218.79-.378 1.54-.404 2.008.09.478.505.478 1.344.056 2.36-1.532 3.69-4.876 5.074-7.03 5.074z"/><circle cx="10.15" cy="14.01" r="2.1"/><path d="M17.5 2.5c1.657 0 3 1.343 3 3s-1.343 3-3 3-3-1.343-3-3 1.343-3 3-3z"/></svg>
        <span>微博</span>
      </a>
      <a class="gb-share-btn gb-share-qq" onclick="shareToQQ()" title="分享到QQ">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 13.2c-.24.66-.72 1.32-1.24 1.56.24.66.08 1.14-.36 1.38-.44.24-.96.12-1.32-.2-.24.1-.56.16-.88.16s-.64-.06-.88-.16c-.36.32-.88.44-1.32.2-.44-.24-.6-.72-.36-1.38-.52-.24-1-.9-1.24-1.56-.34-.94-.12-1.74.48-1.74.16 0 .32.06.48.16.28-.88.88-1.62 1.6-2.02-.06-.12-.1-.26-.1-.4 0-.5.4-.9.9-.9s.9.4.9.9c0 .14-.04.28-.1.4.72.4 1.32 1.14 1.6 2.02.16-.1.32-.16.48-.16.6 0 .82.8.48 1.74z"/></svg>
        <span>QQ</span>
      </a>
      <a class="gb-share-btn gb-share-wechat" onclick="copyGuestbookLink()" title="复制链接分享到微信">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.11-2.931-5.828-7.062-6.122zM14.033 13.4c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.97.983.976.976 0 0 1-.968-.983c0-.542.434-.982.969-.982z"/></svg>
        <span>微信</span>
      </a>
      <a class="gb-share-btn gb-share-douban" onclick="shareToDouban()" title="分享到豆瓣">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 2h18v2H3V2zm0 4h18v2H3V6zm0 4h18v2H3v-2zm2 4h14v6H5v-6zm2 2v2h10v-2H7z"/></svg>
        <span>豆瓣</span>
      </a>
      <a class="gb-share-btn gb-share-copy" onclick="copyGuestbookLink()" title="复制链接">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span>复制链接</span>
      </a>
    </div>
  </div>
</article>

<script>
function shareToWeibo() {
  const url = encodeURIComponent(window.location.href);
  const title = encodeURIComponent(document.title + ' - 来留言吧！');
  window.open('https://service.weibo.com/share/share.php?url=' + url + '&title=' + title, '_blank', 'width=600,height=500');
}

function shareToQQ() {
  const url = encodeURIComponent(window.location.href);
  const title = encodeURIComponent(document.title);
  const summary = encodeURIComponent('来我的留言板聊聊吧！');
  window.open('https://connect.qq.com/widget/shareqq/index.html?url=' + url + '&title=' + title + '&summary=' + summary, '_blank', 'width=600,height=500');
}

function shareToDouban() {
  const url = encodeURIComponent(window.location.href);
  const title = encodeURIComponent(document.title);
  window.open('https://www.douban.com/share/service?url=' + url + '&name=' + title, '_blank', 'width=600,height=500');
}

function copyGuestbookLink() {
  navigator.clipboard.writeText(window.location.href).then(function() {
    const btn = document.querySelector('.gb-share-copy span, .gb-share-wechat span');
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '已复制!';
      setTimeout(function() { btn.textContent = orig; }, 1500);
    }
  });
}
</script>
{{- end }}
